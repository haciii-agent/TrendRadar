# ═══════════════════════════════════════════════════════════════
#                   TrendRadar 时间线配置
#                      Version: 1.2.0
# ═══════════════════════════════════════════════════════════════

presets:
  always_on:
    name: "全天监控"
    description: "全天候监控，有新增立即推送。适合重度用户。"
    default:
      collect: true
      analyze: false
      ai_mode: "current"
      push: true
      report_mode: "incremental"
      once:
        analyze: false
        push: false
    periods: {}
    day_plans:
      all_day:
        periods: []
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

  morning_evening:
    name: "早晚汇总"
    description: "全天推送 + 晚间当日汇总。适合大多数人。"
    default:
      collect: true
      analyze: true
      ai_mode: "current"
      push: true
      report_mode: "current"
      once:
        analyze: false
        push: false
    periods:
      evening_summary:
        name: "晚间汇总"
        start: "20:00"
        end: "22:00"
        analyze: true
        ai_mode: "daily"
        report_mode: "daily"
        once:
          analyze: true
          push: true
    day_plans:
      all_day:
        periods: ["evening_summary"]
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

custom:
  name: "自定义6小时推送/1.5小时爬取"
  description: "每1.5小时爬取一次，每6小时推送一次汇总"

  # 默认配置：所有时间默认只爬取+AI分析，不推送
  default:
    collect: true
    analyze: true
    ai_mode: "current"
    push: false
    report_mode: "current"
    once:
      analyze: true
      push: true

  # 时间段定义：每6小时一个窗口，仅在窗口内允许推送一次
  periods:
    push_0_6:
      name: "0点档推送"
      start: "00:00"
      end: "02:00"
      push: true
      report_mode: "current"
    push_6_12:
      name: "6点档推送"
      start: "06:00"
      end: "08:00"
      push: true
      report_mode: "current"
    push_12_18:
      name: "12点档推送"
      start: "12:00"
      end: "14:00"
      push: true
      report_mode: "current"
    push_18_24:
      name: "18点档推送"
      start: "18:00"
      end: "20:00"
      push: true
      report_mode: "current"

  # 日计划：每天使用上述4个推送窗口
  day_plans:
    all_day:
      periods: ["push_0_6", "push_6_12", "push_12_18", "push_18_24"]

  # 周映射：每天都用同一套计划
  week_map:
    1: "all_day"
    2: "all_day"
    3: "all_day"
    4: "all_day"
    5: "all_day"
    6: "all_day"
    7: "all_day"

  overlap:
    policy: "error_on_overlap"
